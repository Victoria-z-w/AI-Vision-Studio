version: "3.8"

services:
  api:
    build:
      context: ./backend
      args:
        PIP_EXTRAS: "${PIP_EXTRAS:-.[dev,cpu]}"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
    volumes:
      - uploads:/app/data/uploads
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      args:
        PIP_EXTRAS: "${PIP_EXTRAS:-.[dev,cpu]}"
    command: celery -A celery_worker worker --concurrency=1 -Q default --loglevel=INFO
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - uploads:/app/data/uploads
      - ./data:/app/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  uploads:
  redis_data:
